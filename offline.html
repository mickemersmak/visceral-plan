<!doctype html>
<html lang="sv">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
    <meta name="theme-color" content="#0f1916">
    <meta name="color-scheme" content="light">
    <title>Visceral Plan offline</title>
    <link rel="manifest" href="manifest.json">
    <link rel="icon" href="assets/icon.svg" type="image/svg+xml">
    <style>
      :root {
        color-scheme: light;
        font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        --deep: #0a1210;
        --green: #123f35;
        --gold: #e8c575;
        --surface: #fffdf7;
        --muted: #637169;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        padding: 22px;
        background:
          linear-gradient(135deg, rgba(18, 63, 53, 0.14), rgba(255, 253, 247, 0) 36%),
          linear-gradient(315deg, rgba(232, 197, 117, 0.18), rgba(255, 253, 247, 0) 34%),
          #f1f3ee;
        color: #0d1411;
      }

      main {
        width: min(100%, 520px);
        border: 1px solid rgba(232, 197, 117, 0.28);
        border-radius: 12px;
        padding: 28px;
        background:
          linear-gradient(135deg, rgba(10, 18, 16, 0.985), rgba(18, 63, 53, 0.95)),
          var(--deep);
        color: #fffefa;
        box-shadow: 0 34px 100px rgba(10, 18, 16, 0.24);
      }

      span {
        display: inline-flex;
        border: 1px solid rgba(232, 197, 117, 0.34);
        border-radius: 999px;
        padding: 6px 10px;
        color: var(--gold);
        font-size: 0.75rem;
        font-weight: 900;
        text-transform: uppercase;
      }

      h1 {
        margin: 14px 0 0;
        font-size: clamp(2rem, 11vw, 3.4rem);
        line-height: 1;
        letter-spacing: 0;
      }

      p {
        margin: 16px 0 0;
        color: rgba(255, 254, 250, 0.74);
        line-height: 1.6;
      }

      a {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        min-height: 48px;
        margin-top: 22px;
        border: 1px solid #0a2d26;
        border-radius: 8px;
        padding: 12px 16px;
        background: linear-gradient(135deg, var(--green), #247b66);
        color: #fffefa;
        font-weight: 950;
        text-decoration: none;
      }
    </style>
  </head>
  <body>
    <main>
      <span>Offline-läge</span>
      <h1>Planen finns kvar.</h1>
      <p>Du är utan nät just nu. Öppna appen igen så laddas sparad plan, logg och PWA-skal från enheten.</p>
      <a href="/">Öppna Visceral Plan</a>
    </main>
  </body>
</html>
